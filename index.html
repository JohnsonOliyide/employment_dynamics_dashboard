<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>U.S. Employment Dynamics Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f5f7fb}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px}
#industryChart,#stateMap{height:600px}
</style>
</head>
<body>
<h1>U.S. Employment Dynamics Dashboard</h1>
<div class="card">
<h2>Summary</h2>
<p>Connects to industry_employment.csv and state_employment.csv generated by your GitHub workflow.</p>
</div>
<div class="card">
<h2>Industry Contributions</h2>
<div id="industryChart"></div>
</div>
<div class="card">
<h2>State Employment Map</h2>
<div id="stateMap"></div>
</div>

<script>
async function loadCSV(url){
 const text=await fetch(url).then(r=>r.text());
 return Papa.parse(text,{header:true,dynamicTyping:true}).data;
}

Promise.all([
 loadCSV('./data/industry_employment.csv'),
 loadCSV('./data/state_employment.csv')
]).then(([industry,state])=>{

 const latest=[...new Set(industry.map(d=>d.date))].sort().pop();
 const rows=industry.filter(d=>d.date===latest);

 Plotly.newPlot('industryChart',[{
   x:rows.map(d=>d.sector),
   y:rows.map(d=>d.mom_change_thousands),
   type:'bar'
 }],{title:'Monthly Employment Change by Sector'});

 const srows=state.filter(d=>d.date===[...new Set(state.map(d=>d.date))].sort().pop());

 Plotly.newPlot('stateMap',[{
   type:'choropleth',
   locationmode:'USA-states',
   locations:srows.map(d=>d.abbr),
   z:srows.map(d=>d.yoy_growth_pct)
 }],{
   geo:{scope:'usa'},
   title:'State Employment Growth'
 });

});
</script>
</body>
</html>
